# yt-dlp configuration – copy to /app/config/yt-dlp.conf
# See: https://github.com/yt-dlp/yt-dlp#configuration

# Output template
-o /downloads/%(uploader)s/%(title)s.%(ext)s

# Format selection: best video + audio up to 1080p
-f bestvideo[height<=1080]+bestaudio/best[height<=1080]

# Write metadata
--write-info-json
--write-thumbnail

# Embed metadata in the file
--embed-metadata
--embed-thumbnail

# Limit download speed (optional – uncomment to enable)
# --limit-rate 5M

# Retries
--retries 3
--fragment-retries 3

# User agent
--user-agent "Tanuki/1.0"
