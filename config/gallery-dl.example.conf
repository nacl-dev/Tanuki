{
    "#":            "gallery-dl configuration – copy to /app/config/gallery-dl.conf",

    "extractor": {
        "#":        "Where to save downloaded files",
        "base-directory": "/downloads/",

        "#":        "Default naming pattern",
        "filename": "{filename}.{extension}",

        "nhentai": {
            "directory": ["{title}"],
            "filename":  "{num:>04}.{extension}"
        },

        "pixiv": {
            "directory":    ["pixiv", "{user[name]}"],
            "filename":     "{id}_{num}.{extension}",
            "access-token": ""
        }
    },

    "downloader": {
        "http": {
            "retries":        3,
            "timeout":        30,
            "user-agent":     "Tanuki/1.0"
        }
    },

    "output": {
        "mode":       "terminal",
        "progress":   true,
        "shorten":    true,
        "log":        {"level": "info"}
    }
}
