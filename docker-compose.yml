services:
  # ─── API Server + Frontend ───────────────────────────────────────────────────
  app:
    build:
      context: .
      target: app
    container_name: tanuki-app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://tanuki:secret@db:5432/tanuki?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - MEDIA_PATH=/media
      - THUMBNAILS_PATH=/thumbnails
      - DOWNLOADS_PATH=/media
      - INBOX_PATH=/inbox
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=8080
      - SCAN_INTERVAL=${SCAN_INTERVAL:-300}
      - PLUGINS_PATH=/app/config/plugins
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
    volumes:
      - ./media:/media
      - ./inbox:/inbox
      - thumbnails:/thumbnails
      - downloads:/downloads
      - config:/app/config
      - plugins:/app/config/plugins
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Background Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: worker
    container_name: tanuki-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://tanuki:secret@db:5432/tanuki?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - MEDIA_PATH=/media
      - THUMBNAILS_PATH=/thumbnails
      - INBOX_PATH=/inbox
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PLUGINS_PATH=/app/config/plugins
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
    volumes:
      - ./media:/media:ro
      - ./inbox:/inbox:ro
      - thumbnails:/thumbnails
      - config:/app/config
      - plugins:/app/config/plugins
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  # ─── Download Manager Daemon ─────────────────────────────────────────────────
  downloader:
    build:
      context: .
      target: downloader
    container_name: tanuki-downloader
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://tanuki:secret@db:5432/tanuki?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - DOWNLOADS_PATH=/media
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-3}
      - RATE_LIMIT_DELAY=${RATE_LIMIT_DELAY:-1000}
      - DOWNLOADER_COOKIES_FILE=${DOWNLOADER_COOKIES_FILE:-}
      - YTDLP_IMPERSONATE=${YTDLP_IMPERSONATE:-chrome}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./media:/media
      - downloads:/downloads
      - config:/app/config
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tanuki-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tanuki}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-tanuki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tanuki}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: tanuki-cache
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  thumbnails:
  downloads:
  config:
  plugins:
  redisdata:
